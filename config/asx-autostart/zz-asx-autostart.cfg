{
    "jobs" : [
        {
            "name" : "post-fs-data",
            "cmds" : [
                "start asx-autostart"
            ]
        }
    ],
    "services" : [
        {
            "name" : "asx-autostart",
            "path" : ["/system/bin/sh", "/system/bin/asx_boot.sh"],
            "uid" : "root",
            "gid" : ["root"],
            "secon" : "u:r:su:s0",
            "start-mode" : "condition",
            "once" : 1,
            "console" : 0,
            "sandbox" : 0
        }
    ]
}
